<div class="net-worth-compact">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-state-compact">
    <div class="spinner-border spinner-border-sm text-warning" role="status">
      <span class="sr-only">Cargando...</span>
    </div>
    <small class="text-muted ms-2">Calculando patrimonio neto...</small>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="alert alert-danger alert-sm mb-0" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    {{ error }}
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="loadNetWorth()">
      Reintentar
    </button>
  </div>

  <!-- Success State - Compact Inline Version -->
  <div *ngIf="!isLoading && !error && netWorthData" class="net-worth-inline-row">
    <!-- Title & Badge -->
    <div class="inline-header">
      <i class="bi bi-gem me-2"></i>
      <span class="section-label">PATRIMONIO NETO</span>
      <span *ngIf="metrics" class="badge ms-2" [ngClass]="'badge-' + metrics.healthColor">
        {{ getHealthStatusLabel() }}
      </span>
    </div>

    <!-- Metrics: Activos | Pasivos | Ratio A/P -->
    <div class="inline-metrics">
      <!-- Activos -->
      <div class="inline-metric-item">
        <i class="bi bi-arrow-up-circle-fill text-success me-2"></i>
        <div class="metric-info">
          <span class="metric-label-small">Activos</span>
          <span class="metric-value-compact text-success">
            {{ formatCurrency(netWorthData.totalAssets) }}
          </span>
        </div>
      </div>

      <div class="metric-divider">|</div>

      <!-- Pasivos -->
      <div class="inline-metric-item">
        <i class="bi bi-arrow-down-circle-fill text-danger me-2"></i>
        <div class="metric-info">
          <span class="metric-label-small">Pasivos</span>
          <span class="metric-value-compact text-danger">
            {{ formatCurrency(netWorthData.totalLiabilities) }}
          </span>
        </div>
      </div>

      <div class="metric-divider">|</div>

      <!-- Ratio A/P -->
      <div class="inline-metric-item" *ngIf="metrics">
        <i class="bi bi-percent me-2" [ngClass]="metrics.healthColor + '-icon'"></i>
        <div class="metric-info">
          <span class="metric-label-small">Ratio A/P</span>
          <span class="metric-value-compact" [ngClass]="metrics.healthColor + '-text'">
            {{ metrics.assetLiabilityRatio }}x
          </span>
        </div>
      </div>
    </div>

    <!-- Action Link -->
    <div class="inline-action">
      <button type="button"
              class="btn btn-link btn-sm text-primary"
              (click)="goToPatrimonioTab()">
        Ver detalle <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </div>
  </div>
</div>
